
<style>
  .wrap { font-family: var(--font-sans); padding: 1rem 0; }
  .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab { padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); font-size: 13px; cursor: pointer; background: var(--surface-1); color: var(--text-secondary); transition: all 0.15s; }
  .tab.active { background: var(--bg-accent); color: var(--text-accent); border-color: var(--border-accent); font-weight: 500; }
  .screen { display: none; }
  .screen.active { display: block; }
  .frame { border: 0.5px solid var(--border); border-radius: 12px; background: var(--surface-2); overflow: hidden; }
  .topbar { background: var(--surface-1); border-bottom: 0.5px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-secondary); }
  .badge { background: var(--bg-accent); color: var(--text-accent); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .body { display: flex; min-height: 380px; }
  .sidebar { width: 140px; border-right: 0.5px solid var(--border); background: var(--surface-1); padding: 12px 0; flex-shrink: 0; }
  .menu-item { padding: 8px 16px; font-size: 12px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .menu-item.active { color: var(--text-accent); background: var(--bg-accent); font-weight: 500; }
  .menu-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .content { flex: 1; padding: 16px; overflow: hidden; }
  .page-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 100px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .stat-sub { font-size: 11px; color: var(--text-success); margin-top: 2px; }
  .table-wrap { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--surface-1); padding: 8px 10px; text-align: left; color: var(--text-muted); font-weight: 400; border-bottom: 0.5px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); color: var(--text-primary); }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .pill-pending { background: var(--bg-warning); color: var(--text-warning); }
  .pill-confirmed { background: var(--bg-accent); color: var(--text-accent); }
  .pill-shipped { background: var(--bg-success); color: var(--text-success); }
  .pill-canceled { background: var(--bg-danger); color: var(--text-danger); }
  .btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); cursor: pointer; }
  .btn-primary { background: var(--fill-accent); color: var(--on-accent); border-color: var(--fill-accent); }
  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .search-input { flex: 1; height: 30px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-1); padding: 0 10px; font-size: 12px; color: var(--text-primary); }
  .filter-btn { font-size: 12px; padding: 0 10px; height: 30px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; }
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .val { font-size: 13px; color: var(--text-primary); }
  .divider { height: 0.5px; background: var(--border); margin: 10px 0; }
  .item-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .item-row:last-child { border-bottom: none; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--surface-1); color: var(--text-secondary); border: 0.5px solid var(--border); }
  .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .prod-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; }
  .prod-img { height: 50px; background: var(--surface-0); border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
  .prod-name { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .prod-price { font-size: 12px; color: var(--text-accent); margin-bottom: 6px; }
  .prod-stock { font-size: 11px; color: var(--text-muted); }
  .note { font-size: 11px; color: var(--text-muted); margin-top: 12px; padding: 8px 10px; background: var(--surface-1); border-radius: var(--radius); border-left: 2px solid var(--border-accent); }
</style>

<div class="wrap">

  <div class="nav" id="nav"></div>

        <div class="card" style="margin-bottom:10px;">
          <div class="label">期望送达日期</div>

      `;
    }
  },
  {

    menu: ["工作台", "商品目录", "下单", "我的订单", "对账中心", "账户设置"],
    activeMenu: 3,
    render() {
      return `
        <div class="page-title">我的订单</div>
        <div class="search-bar">

const nav = document.getElementById("nav");
const screens = document.getElementById("screens");

pages.forEach((page, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = page.label;
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("screen-" + page.id).classList.add("active");
  };
  nav.appendChild(btn);

  const div = document.createElement("div");
  div.id = "screen-" + page.id;
  div.className = "screen" + (i === 0 ? " active" : "");

  if (page.menu) {
    div.innerHTML = `
      <div class="frame">
        <div class="topbar">
          <div class="logo">联豪订购平台</div>
          <div class="topbar-right">
            <span>上海某餐饮有限公司</span>
            <span class="badge">B端客户</span>
            <i class="ti ti-bell" style="font-size:16px;" aria-hidden="true"></i>
          </div>
        </div>
        <div class="body">
          <div class="sidebar">
            ${page.menu.map((m, j) => `<div class="menu-item${j === page.activeMenu ? " active" : ""}"><span class="menu-dot"></span>${m}</div>`).join("")}
          </div>
          <div class="content">${page.render()}</div>
        </div>
      </div>
    `;
  } else {
    div.innerHTML = `<div>${page.render()}</div>`;
  }
  screens.appendChild(div);
});
</script>
